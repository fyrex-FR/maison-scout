services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maison_scout
      POSTGRES_USER: maison
      POSTGRES_PASSWORD: maison
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://maison:maison@db:5432/maison_scout
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

